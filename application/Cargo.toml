serde_default = "0.2.0"
arc-swap = "1.9.1"
chrono = { version = "0.4.40", features = ["serde"] }
sysinfo = "0.39.0"
constant_time_eq = "0.5.0"
serde_json = "1.0.139"

[build-dependencies]
serde = { workspace = true }
