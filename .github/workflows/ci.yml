name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  checks:
    name: Format, Lint, Test & Dev Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true
          cache-key: ci

      - name: Generate documentation
        run: cargo run --bin generate-docs

      - name: Verify docs are up to date
        run: git diff --exit-code docs/

      - name: Check formatting
        run: |
          cargo fmt --all
          if ! git diff --quiet -- '*.rs'; then
            echo "::error::Rust sources are not rustfmt-clean. Run 'make fmt' locally, or 'make setup-hooks' once to auto-format on commit."
            git diff -- '*.rs'
            exit 1
          fi

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --all-targets

      - name: Build debug binary
        run: cargo build

      - name: Smoke test version command
        run: ./target/debug/featherfly version

      - name: Smoke test diagnostics command
        run: |
          cp config.example.yml /tmp/featherfly-ci-config.yml
          ./target/debug/featherfly --debug -c /tmp/featherfly-ci-config.yml diagnostics | head -20
