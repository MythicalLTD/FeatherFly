name: Release

on:
  push:
    tags:
      - "release-*"

env:
  BIN_NAME: featherfly
  PROJECT_NAME: featherfly
  CARGO_INCREMENTAL: 0

jobs:
  dist:
    name: Release build (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - x86_64-linux
          - aarch64-linux
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - build: aarch64-linux
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Cache cross
        if: matrix.build == 'aarch64-linux'
        uses: actions/cache@v4
        id: cross-cache
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross
        if: matrix.build == 'aarch64-linux' && steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Determine release version
        id: release_info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: |
          if [ "${{ matrix.build }}" = "aarch64-linux" ]; then
            cross test --release --target ${{ matrix.target }}
          else
            cargo test --release
          fi

      - name: Build release binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.build }}" = "aarch64-linux" ]; then
            cross build --release --target ${{ matrix.target }}
            cp "target/${{ matrix.target }}/release/$BIN_NAME" \
              "dist/$BIN_NAME-v${{ steps.release_info.outputs.version }}-${{ matrix.build }}"
          else
            cargo build --release
            cp "target/release/$BIN_NAME" \
              "dist/$BIN_NAME-v${{ steps.release_info.outputs.version }}-${{ matrix.build }}"
          fi

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/${{ env.BIN_NAME }}-v${{ steps.release_info.outputs.version }}-${{ matrix.build }}

  publish-release:
    name: Publish GitHub Release
    needs: [dist]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release metadata
        id: release_info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FeatherFly v${{ steps.release_info.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*/*
