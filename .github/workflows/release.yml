name: Release

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: read

env:
  BIN_NAME: featherfly
  PROJECT_NAME: featherfly
  CARGO_INCREMENTAL: 0

jobs:
  dist:
    name: Dist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        build:
          - x86_64-linux
          - aarch64-linux
          - riscv64-linux
          - ppc64le-linux
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            crt_static: true
          - build: aarch64-linux
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            crt_static: true
          - build: riscv64-linux
            os: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            crt_static: false
          - build: ppc64le-linux
            os: ubuntu-24.04
            target: powerpc64le-unknown-linux-gnu
            crt_static: false

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true
          cache-key: release-${{ matrix.target }}

      - name: Cache cross
        uses: actions/cache@v4
        id: cross-cache
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross
        if: steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Run cargo test
        run: cross test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.crt_static }}" = "true" ]; then
            RUSTFLAGS="-C target-feature=+crt-static" \
              cross build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary with platform name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME-${{ matrix.build }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/${{ env.BIN_NAME }}-${{ matrix.build }}

  publish-draft-release:
    name: Publish Draft Release
    needs: [dist]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f ! -name 'SHA256SUMS' -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum featherfly-* > SHA256SUMS
          ls -la

      - name: Determine if pre-release and strip prefix
        id: release_info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_info.outputs.version }}
          draft: true
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: release-assets/*
