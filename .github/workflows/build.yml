name: Release Nightly

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BIN_NAME: featherfly
  PROJECT_NAME: featherfly
  CARGO_INCREMENTAL: 0

jobs:
  dist:
    name: Dist (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        build:
          - x86_64-linux
          - aarch64-linux
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            crt_static: true
          - build: aarch64-linux
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            crt_static: true

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true
          cache-key: nightly-${{ matrix.target }}

      - name: Cache cross
        uses: actions/cache@v4
        id: cross-cache
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross
        if: steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Run cargo test
        run: cross test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.crt_static }}" = "true" ]; then
            RUSTFLAGS="-C target-feature=+crt-static" \
              cross build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary with platform name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME-${{ matrix.build }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/${{ env.BIN_NAME }}-${{ matrix.build }}

  dist-exotic:
    name: Dist (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        build:
          - riscv64-linux
          - ppc64le-linux
        include:
          - build: riscv64-linux
            os: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            crt_static: false
          - build: ppc64le-linux
            os: ubuntu-24.04
            target: powerpc64le-unknown-linux-gnu
            crt_static: false

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true
          cache-key: nightly-${{ matrix.target }}

      - name: Cache cross
        uses: actions/cache@v4
        id: cross-cache
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross
        if: steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Run cargo test
        run: cross test --release --target ${{ matrix.target }}

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare binary with platform name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME-${{ matrix.build }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/${{ env.BIN_NAME }}-${{ matrix.build }}

  publish-nightly:
    name: Publish nightly release
    needs: [dist, dist-exotic]
    if: ${{ !cancelled() && needs.dist.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f ! -name 'SHA256SUMS' -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum featherfly-* > SHA256SUMS || true
          ls -la

      - name: Publish nightly GitHub release
        run: |
          NOTES="Automated nightly build from [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})."

          if gh release view nightly --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload nightly release-assets/* --clobber --repo "$GH_REPO"
            gh release edit nightly --repo "$GH_REPO" --prerelease --title "Nightly" --notes "$NOTES"
          else
            gh release create nightly release-assets/* \
              --repo "$GH_REPO" \
              --target "${{ github.sha }}" \
              --prerelease \
              --title "Nightly" \
              --notes "$NOTES"
          fi
