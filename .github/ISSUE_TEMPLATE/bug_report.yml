name: Bug Report
description: Report a bug in FeatherFly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start featherfly with ...
        2. Call GET /api/...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FeatherFly version
      placeholder: output of `featherfly version`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Debian/Ubuntu
        - RHEL/CentOS
        - Arch
        - Other Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs or diagnostics output (redact secrets).
      render: shell
